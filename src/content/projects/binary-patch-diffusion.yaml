name: Binary Patch Diffusion
tagline: Predicting masked x86-64 assembly via diffusion models
description: >-
  An ML system that uses continuous diffusion to predict masked spans of x86-64
  assembly instructions. Trained on 518k examples extracted from 5,675 system
  ELF binaries. Features a DiT architecture with adaLN-Zero conditioning.
